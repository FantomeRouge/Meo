            }));
          });
          marker.dots.forEach(function (dot) {
            if (hl) g.appendChild(svgEl("circle", { cx: dot.x, cy: dot.y, r: 10, fill: acc, opacity: 0.15 }));
            g.appendChild(svgEl("circle", { cx: dot.x, cy: dot.y, r: hl ? 4.5 : 3.5, fill: acc }));
            g.appendChild(svgEl("circle", { cx: dot.x, cy: dot.y, r: 18, fill: "transparent" }));
          });
          var badge = svgEl("circle", { cx: marker.labelPos.x, cy: marker.labelPos.y, r: 10, fill: labelBg(), stroke: acc, "stroke-width": 1 });
          g.appendChild(badge);
          var numText = svgEl("text", {
            x: marker.labelPos.x, y: marker.labelPos.y + 3, "text-anchor": "middle",
            "font-family": "'Playfair Display', Georgia, serif", "font-size": 10, "font-weight": 600, fill: labelText()
          });
          numText.textContent = marker.number;
          g.appendChild(numText);
          var lbl = svgEl("text", {
            x: marker.labelPos.x + 20, y: marker.labelPos.y + 3, "text-anchor": "start",
            "font-family": "'Playfair Display', Georgia, serif", "font-size": 13, "font-weight": 600,
            fill: labelFill(), "letter-spacing": 1
          });
          lbl.textContent = marker.label;
          g.appendChild(lbl);
          g.appendChild(svgEl("rect", { x: marker.labelPos.x - 12, y: marker.labelPos.y - 14, width: 130, height: 28, fill: "transparent" }));
          return;
        }

        var dot = marker.dots[0];
        var labelAnchor = marker.labelSide === "right" ? "end" : "start";
        var numberX = marker.labelPos.x;
        var textX = marker.labelSide === "right" ? marker.labelPos.x - 20 : marker.labelPos.x + 20;
        var d = marker.linePoints.map(function (p, i) { return (i === 0 ? "M" : "L") + " " + p[0] + " " + p[1]; }).join(" ");

        g.appendChild(svgEl("path", { d: d, fill: "none", stroke: acc, "stroke-width": hl ? 1.2 : 0.8, "stroke-dasharray": hl ? "none" : "3 3", opacity: hl ? 0.9 : 0.5 }));
        if (hl) g.appendChild(svgEl("circle", { cx: dot.x, cy: dot.y, r: 10, fill: acc, opacity: 0.15 }));
        g.appendChild(svgEl("circle", { cx: dot.x, cy: dot.y, r: hl ? 4.5 : 3.5, fill: acc }));
        g.appendChild(svgEl("circle", { cx: dot.x, cy: dot.y, r: 18, fill: "transparent" }));
        g.appendChild(svgEl("circle", { cx: numberX, cy: marker.labelPos.y, r: 10, fill: labelBg(), stroke: acc, "stroke-width": 1 }));
        var numText2 = svgEl("text", {
          x: numberX, y: marker.labelPos.y + 3, "text-anchor": "middle",
          "font-family": "'Playfair Display', Georgia, serif", "font-size": 10, "font-weight": 600, fill: labelText()
        });
        numText2.textContent = marker.number;
        g.appendChild(numText2);
        var lbl2 = svgEl("text", {
          x: textX, y: marker.labelPos.y + 3, "text-anchor": labelAnchor,
          "font-family": "'Playfair Display', Georgia, serif", "font-size": 13, "font-weight": 600,
          fill: labelFill(), "letter-spacing": 1
        });
        lbl2.textContent = marker.label;
        g.appendChild(lbl2);
        g.appendChild(svgEl("rect", {
          x: marker.labelSide === "right" ? marker.labelPos.x - 120 : marker.labelPos.x - 12,
          y: marker.labelPos.y - 14, width: 132, height: 28, fill: "transparent"
        }));
      }

      g.addEventListener("mouseenter", function () { hovered = true; render(); });
      g.addEventListener("mouseleave", function () { hovered = false; render(); });
      g.addEventListener("click", function () { onZoneClick(marker.id); });

      render();
      svg.appendChild(g);
      groups[marker.id] = render;
    });

    wrap.appendChild(svg);
    return { element: wrap, refreshAll: function () { Object.keys(groups).forEach(function (k) { groups[k](); }); } };
  }

  // ---------- Service detail ----------
  function TitleBar(text) {
    var bar = el("div", {
      fontFamily: "'Inter', sans-serif", fontSize: "11px", letterSpacing: "2px",
      textTransform: "uppercase", color: "#C4949C", marginTop: "24px", marginBottom: "12px",
      display: "flex", alignItems: "center", gap: "8px"
    });
    var l1 = el("span", { height: "1px", background: "#F2C9D2", flex: "1" });
    var l2 = el("span", { height: "1px", background: "#F2C9D2", flex: "1" });
    var t = document.createTextNode(text);
    bar.appendChild(l1); bar.appendChild(t); bar.appendChild(l2);
    return bar;
  }
  function StepRow(num, text, isLast) {
    var li = el("li", {
      display: "flex", gap: "12px", marginBottom: "12px", padding: "10px 0",
      borderBottom: isLast ? "none" : "1px solid #FFEAF1"
    });
    var badge = el("div", {
      flexShrink: "0", width: "24px", height: "24px", borderRadius: "50%",
      background: "linear-gradient(135deg, #FFEAF1, #F7DCE4)", color: "#C4949C",
      fontFamily: "'Playfair Display', serif", fontSize: "11px", fontWeight: "600",
      display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #F2C9D2"
    }, String(num));
    var txt = el("div", {
      fontFamily: "'Inter', sans-serif", fontSize: "12.5px", color: "#6B4F55", lineHeight: "1.55", flex: "1"
    }, text);
    li.appendChild(badge); li.appendChild(txt);
    return li;
  }

  function createServiceDetail(service, onBack) {
    var container = el("div", {
      opacity: "0", transform: "translateX(20px)", transition: "all 0.3s ease",
      padding: "20px 24px 28px"
    });

    var backBtn = el("button", {
      background: "transparent", border: "none", color: "#C4949C",
      fontFamily: "'Inter', sans-serif", fontSize: "12px", cursor: "pointer",
      padding: "0", marginBottom: "12px", letterSpacing: "1px", textTransform: "uppercase",
      display: "flex", alignItems: "center", gap: "6px"
    }, "← Back to services");
    backBtn.addEventListener("click", onBack);
    container.appendChild(backBtn);

    container.appendChild(el("h3", {
      fontFamily: "'Playfair Display', Georgia, serif", fontSize: "22px", fontWeight: "600",
      color: "#6B4F55", margin: "0 0 8px"
    }, service.name));

    container.appendChild(el("p", {
      fontFamily: "'Inter', sans-serif", fontSize: "13px", color: "#8B6B72",
      lineHeight: "1.6", margin: "0 0 16px"
    }, service.desc));

    container.appendChild(el("div", {
      display: "inline-block", background: "linear-gradient(135deg, #E9B7C4, #D6B3B8)",
      color: "white", padding: "6px 16px", borderRadius: "16px",
      fontFamily: "'Playfair Display', Georgia, serif", fontSize: "16px", fontWeight: "600", marginBottom: "4px"
    }, service.price));

    if (service.duration) {
      container.appendChild(el("div", { fontSize: "11px", color: "#C4949C", marginTop: "4px", marginBottom: "4px" }, service.duration));
    }

    if (service.sections && service.sections.length > 0) {
      container.appendChild(TitleBar("QUY TRÌNH LIỆU TRÌNH"));
      var counter = 0;
      service.sections.forEach(function (section, si) {
        var block = el("div", { marginBottom: si < service.sections.length - 1 ? "20px" : "0" });
        var head = el("div", {
          fontFamily: "'Playfair Display', Georgia, serif", fontSize: "14.5px", fontWeight: "600",
          color: "#6B4F55", marginTop: si === 0 ? "4px" : "12px", marginBottom: "6px", paddingBottom: "8px",
          borderBottom: "1px solid #F2C9D2", display: "flex", alignItems: "baseline", gap: "10px"
        });
        head.appendChild(el("span", {
          fontFamily: "'Playfair Display', serif", fontSize: "11px", color: "#D6B3B8",
          fontStyle: "italic", fontWeight: "400"
        }, "Phần " + (si + 1)));
        head.appendChild(el("span", {}, section.heading));
        block.appendChild(head);
        var ol = el("ol", { padding: "0", margin: "0", listStyle: "none" });
        section.steps.forEach(function (step, i) {
          counter += 1;
          ol.appendChild(StepRow(counter, step, i === section.steps.length - 1));
        });
        block.appendChild(ol);
        container.appendChild(block);
      });
    } else if (service.steps && service.steps.length > 0) {
      container.appendChild(TitleBar("QUY TRÌNH " + service.steps.length + " BƯỚC"));
      var ol2 = el("ol", { padding: "0", margin: "0", listStyle: "none" });
      service.steps.forEach(function (step, i) {
        ol2.appendChild(StepRow(i + 1, step, i === service.steps.length - 1));
      });
      container.appendChild(ol2);
    } else if (service.processNote) {
      container.appendChild(TitleBar("VỀ LIỆU TRÌNH"));
      container.appendChild(el("div", {
        fontFamily: "'Inter', sans-serif", fontSize: "13px", color: "#6B4F55",
        lineHeight: "1.7", padding: "4px 2px"
      }, service.processNote));
    } else {
      container.appendChild(el("div", {
        marginTop: "24px", padding: "16px", background: "#FAF6F3", borderRadius: "10px",
        fontSize: "12px", color: "#8B6B72", fontStyle: "italic", textAlign: "center"
      }, "Quy trình chi tiết đang được cập nhật"));
    }

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        container.style.opacity = "1";
        container.style.transform = "translateX(0)";
      });
    });

    return container;
  }

  // ---------- Service panel (modal) ----------
  var panel = { open: false, root: null, overlay: null, card: null, bodyBox: null, data: null, selectedService: null };

  function renderPanelHeader(container) {
    clear(container);
    var closeBtn = el("button", {
      position: "absolute", top: "16px", right: "16px", background: "rgba(255,255,255,0.7)",
      border: "none", width: "32px", height: "32px", borderRadius: "50%", cursor: "pointer",
      fontSize: "18px", color: "#6B4F55", display: "flex", alignItems: "center",
      justifyContent: "center", lineHeight: "1"
    }, "×");
    closeBtn.addEventListener("click", closePanel);
    container.appendChild(closeBtn);

    container.appendChild(el("div", {
      fontFamily: "'Inter', sans-serif", fontSize: "10px", letterSpacing: "3px", color: "#C4949C",
      textTransform: "uppercase", marginBottom: "6px"
    }, "FEM X — " + panel.data.label.toUpperCase()));

    container.appendChild(el("h2", {
      fontFamily: "'Playfair Display', Georgia, serif", fontSize: "24px", fontWeight: "600",
      color: "#6B4F55", margin: "0 0 6px", letterSpacing: "0.5px"
    }, panel.data.label));

    container.appendChild(el("p", {
      fontFamily: "'Playfair Display', Georgia, serif", fontSize: "13px", color: "#C4949C",
      margin: "0", fontStyle: "italic"
    }, panel.data.tagline));
  }

  function renderPanelBody() {
    clear(panel.bodyBox);
    if (panel.selectedService) {
      panel.bodyBox.appendChild(createServiceDetail(panel.selectedService, function () {
        panel.selectedService = null;
        renderPanelBody();
      }));
    } else {
      var list = el("div", { padding: "8px 0 16px" });
      panel.data.services.forEach(function (svc, i) {
        var row = el("button", {
          width: "100%", textAlign: "left", background: "transparent", border: "none",
          padding: "16px 24px",
          borderBottom: i < panel.data.services.length - 1 ? "1px solid #FFEAF1" : "none",
          cursor: "pointer", display: "flex", justifyContent: "space-between",
          alignItems: "flex-start", gap: "14px", transition: "background 0.2s"
        });
        row.addEventListener("mouseenter", function () { row.style.background = "#FAF6F3"; });
        row.addEventListener("mouseleave", function () { row.style.background = "transparent"; });
        row.addEventListener("click", function () {
          panel.selectedService = svc;
          renderPanelBody();
        });

        var left = el("div", { flex: "1" });
        left.appendChild(el("div", {
          fontFamily: "'Playfair Display', Georgia, serif", fontSize: "15.5px", fontWeight: "600",
          color: "#6B4F55", marginBottom: "4px"
        }, svc.name));
        left.appendChild(el("div", {
          fontFamily: "'Inter', sans-serif", fontSize: "12px", color: "#8B6B72", lineHeight: "1.5"
        }, svc.desc));

        var right = el("div", { textAlign: "right", flexShrink: "0" });
        right.appendChild(el("div", {
          fontFamily: "'Playfair Display', serif", fontSize: "14px", fontWeight: "600",
          color: "#C4949C", whiteSpace: "nowrap"
        }, svc.price));
        right.appendChild(el("div", {
          fontSize: "10px", color: "#D6B3B8", marginTop: "4px",
          letterSpacing: "1px", textTransform: "uppercase"
        }, "Xem chi tiết →"));

        row.appendChild(left); row.appendChild(right);
        list.appendChild(row);
      });
      panel.bodyBox.appendChild(list);
    }
  }

  function openPanel(zoneId) {
    var data = SERVICE_DATA.filter(function (s) { return s.id === zoneId; })[0];
    if (!data) return;

    if (!panel.open) {
      panel.root = el("div", { position: "fixed", top: "0", left: "0", right: "0", bottom: "0", zIndex: "100", display: "flex", alignItems: "center", justifyContent: "center" });
      panel.overlay = el("div", { position: "absolute", top: "0", left: "0", right: "0", bottom: "0", background: "rgba(107,79,85,0.22)", opacity: "0", transition: "opacity 0.3s ease", backdropFilter: "blur(2px)" });
      panel.overlay.addEventListener("click", closePanel);

      panel.card = el("div", {
        position: "relative", width: "min(94vw, 460px)", maxHeight: "88vh",
        background: "#FFFFFF", borderRadius: "22px", boxShadow: "0 25px 70px rgba(107,79,85,0.18)",
        overflow: "hidden", transform: "translateY(30px) scale(0.96)", opacity: "0",
        transition: "all 0.4s cubic-bezier(0.16, 1, 0.3, 1)", display: "flex", flexDirection: "column"
      });

      var header = el("div", { background: "linear-gradient(135deg, #FFEAF1, #F7DCE4)", padding: "26px 26px 22px", position: "relative", flexShrink: "0" });
      var bodyBox = el("div", { flex: "1", overflowY: "auto" });

      panel.card.appendChild(header);
      panel.card.appendChild(bodyBox);
      panel.root.appendChild(panel.overlay);
      panel.root.appendChild(panel.card);
      document.body.appendChild(panel.root);

      panel.headerBox = header;
      panel.bodyBox = bodyBox;
      panel.selectedService = null;
      panel.open = true;

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          panel.overlay.style.opacity = "1";
          panel.card.style.transform = "translateY(0) scale(1)";
          panel.card.style.opacity = "1";
        });
      });
    }

    panel.data = data;
    renderPanelHeader(panel.headerBox);
    renderPanelBody();
  }

  function closePanel() {
    if (!panel.open) return;
    panel.overlay.style.opacity = "0";
    panel.card.style.transform = "translateY(30px) scale(0.96)";
    panel.card.style.opacity = "0";
    var rootRef = panel.root;
    setTimeout(function () {
      if (rootRef && rootRef.parentNode) rootRef.parentNode.removeChild(rootRef);
    }, 300);
    panel.open = false;
    panel.root = null; panel.overlay = null; panel.card = null; panel.bodyBox = null;
    panel.data = null; panel.selectedService = null;

    if (state.activeZone !== null) {
      state.activeZone = null;
      state.showPanel = null;
      body.refreshAll();
      refreshNav();
    }
  }

  // ---------- Main layout ----------
  var root = document.getElementById("root");
  var main = el("div", {
    minHeight: "100vh",
    background: "linear-gradient(180deg, #FAF6F3 0%, #FFEAF1 55%, #F7DCE4 100%)",
    fontFamily: "'Inter', -apple-system, sans-serif",
    display: "flex", flexDirection: "column", alignItems: "center", padding: "20px 16px"
  });

  var logo = el("img", { width: "130px", height: "auto", marginBottom: "4px", filter: "drop-shadow(0 2px 8px rgba(196,148,156,0.15))" });
  logo.src = LOGO_DATA_URL;
  logo.alt = "Fem X — Feminine Care & Wellness Spa";
  main.appendChild(logo);

  main.appendChild(el("p", {
    fontFamily: "'Inter', sans-serif", fontSize: "10.5px", letterSpacing: "4px",
    textTransform: "uppercase", color: "#C4949C", margin: "4px 0 4px", textAlign: "center"
  }, "ALL IN ONE FEMININE SPA"));

  var divider = el("div", { display: "flex", alignItems: "center", gap: "8px", margin: "0 0 14px" });
  divider.appendChild(el("span", { width: "24px", height: "1px", background: "#D6B3B8" }));
  divider.appendChild(el("span", { color: "#D6B3B8", fontSize: "8px" }, "✦"));
  divider.appendChild(el("span", { width: "24px", height: "1px", background: "#D6B3B8" }));
  main.appendChild(divider);

  main.appendChild(el("p", {
    fontFamily: "'Playfair Display', Georgia, serif", fontSize: "16px", color: "#6B4F55",
    fontStyle: "italic", margin: "0 0 16px", textAlign: "center", maxWidth: "320px"
  }, "Chạm để khám phá dịch vụ"));

  var mapWrap = el("div", { position: "relative", width: "100%", maxWidth: "380px", display: "flex", justifyContent: "center" });

  function handleZoneClick(id) {
    if (state.activeZone === id) {
      state.activeZone = null;
      state.showPanel = null;
      closePanel();
    } else {
      state.activeZone = id;
      state.showPanel = id;
      openPanel(id);
    }
    body.refreshAll();
    refreshNav();
  }

  var body = createBodySilhouette(handleZoneClick);
  mapWrap.appendChild(body.element);
  main.appendChild(mapWrap);

  var nav = el("div", {
    display: "flex", flexWrap: "wrap", gap: "8px", justifyContent: "center",
    marginTop: "16px", marginBottom: "20px", maxWidth: "420px"
  });
  var navButtons = {};
  SERVICE_DATA.forEach(function (item) {
    var btn = el("button", {
      fontFamily: "'Playfair Display', Georgia, serif", fontSize: "12.5px", fontWeight: "500",
      padding: "8px 16px", borderRadius: "20px", cursor: "pointer", transition: "all 0.25s ease",
      letterSpacing: "0.3px"
    }, item.label);
    btn.addEventListener("click", function () { handleZoneClick(item.id); });
    navButtons[item.id] = btn;
    nav.appendChild(btn);
  });
  function refreshNav() {
    SERVICE_DATA.forEach(function (item) {
      var isActive = state.activeZone === item.id;
      var btn = navButtons[item.id];
      btn.style.border = "1px solid " + (isActive ? "#E9B7C4" : "#F7DCE4");
      btn.style.background = isActive ? "linear-gradient(135deg, #E9B7C4, #D6B3B8)" : "#FFFFFF";
      btn.style.color = isActive ? "#FFFFFF" : "#6B4F55";
      btn.style.boxShadow = isActive ? "0 4px 14px rgba(233,183,196,0.45)" : "0 1px 3px rgba(196,148,156,0.08)";
    });
  }
  refreshNav();
  main.appendChild(nav);

  var footer = el("div", { textAlign: "center", marginTop: "auto", paddingTop: "12px" });
  footer.appendChild(el("div", { width: "40px", height: "1px", background: "#F2C9D2", margin: "0 auto 10px", opacity: "0.6" }));
  footer.appendChild(el("p", {
    fontFamily: "'Inter', sans-serif", fontSize: "10px", color: "#D6B3B8",
    letterSpacing: "2.5px", textTransform: "uppercase"
  }, "Thank you for loving yourself"));
  main.appendChild(footer);

  root.appendChild(main);
})();
</script>
</body>
</html>
